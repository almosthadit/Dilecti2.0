<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dilecti Wordmark Centered Animation</title>
<style>
  :root {
    --green: #00C67A;
    --navy: #082D68;
    --navy2: #003F70;
    --ink: #1d2430;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #f7f7f5;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .stage {
    width: min(92vw, 760px);
    aspect-ratio: 1 / 1;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 18px 45px rgba(8,45,104,0.08);
    display: grid;
    place-items: center;
    position: relative;
  }
  svg {
    width: 92%;
    height: 92%;
    overflow: hidden;
  }
  .controls {
    position: absolute;
    bottom: 18px;
    display: flex;
    gap: 10px;
  }
  button {
    border: 1px solid rgba(8,45,104,.16);
    background: white;
    border-radius: 999px;
    padding: 9px 16px;
    font-weight: 650;
    color: var(--navy);
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(8,45,104,.08);
  }
</style>
</head>
<body>
<div class="stage">
  <svg id="svg" viewBox="0 0 900 900" aria-label="Dilecti animated visual">
    <rect width="900" height="900" fill="#fff"/>

            font-size="150" font-weight="600"
            fill="#082D68" letter-spacing="0.5">dılecti</text>

const iconFns = [iconBowl, iconFood, iconDrink, iconMusic, iconHeadphones, iconBooks, iconBag, iconBottle, iconGame, iconPuzzle, iconTV, iconPopcorn];
const icons = [];
const startDeg = -125;
for (let i=0;i<iconFns.length;i++) {
  const angle = (startDeg + i * 360/iconFns.length) * Math.PI/180;
  const g = make("g");
  iconFns[i](g);
  iconsLayer.appendChild(g);
  icons.push({el:g, angle, r:R, index:i});
}
const dots = [];
for (let i=0;i<72;i++) {
  const angle = (startDeg + i*360/72) * Math.PI/180;
  const c = make("circle",{r:3.1,fill:green});
  dotsLayer.appendChild(c);
  dots.push({el:c, angle, r:R, index:i});
}

function setObj(el,x,y,scale=1,alpha=1) {
  el.setAttribute("transform", `translate(${x.toFixed(2)} ${y.toFixed(2)}) scale(${scale.toFixed(3)})`);
  el.setAttribute("opacity", alpha.toFixed(3));
}
function setDotObj(el,x,y,scale=1,alpha=1) {
  el.setAttribute("cx", x.toFixed(2));
  el.setAttribute("cy", y.toFixed(2));
  el.setAttribute("r", (3.1*scale).toFixed(2));
  el.setAttribute("opacity", alpha.toFixed(3));
}
function posOnOrbit(o, orbitT=0) {
  const a = o.angle + orbitT*Math.PI*2;
  return {x: cx + o.r*Math.cos(a), y: cy + o.r*Math.sin(a)};
}
function suctionPos(o,t,targetY=395) {
  const p0 = posOnOrbit(o, 1);
  const e = easeInOut(t);
  const dx = cx - p0.x, dy = targetY - p0.y;
  const dist = Math.hypot(dx,dy) || 1;
  const px = -dy/dist, py = dx/dist;
  const curve = Math.sin(e*Math.PI)*(1-e)*36*((o.index%2)?-1:1);
  return {x:p0.x + dx*e + px*curve, y:p0.y + dy*e + py*curve};
}

const heartFinalY = 200.96;
const heartStartY = heartFinalY + 120;
const heartFilledFinalY = 200.96;

function setSceneTransform(scale, targetX=450, targetY=450, opacity=1) {
  const tx = targetX - 450 * scale;
  const ty = targetY - 450 * scale;
  sceneGroup.setAttribute("transform", `translate(${tx.toFixed(2)} ${ty.toFixed(2)}) scale(${scale.toFixed(4)})`);
  sceneGroup.setAttribute("opacity", opacity.toFixed(3));
}




function render(elapsed) {
  const t = Math.min(elapsed, TOTAL);

  // reset scene
  setSceneTransform(1, 450, 450, 1);
  waterLayer.setAttribute("opacity", "1");
  reflectionLayer.setAttribute("opacity", "0");
  cloudLayer.setAttribute("opacity", "1");
  heartOutlineLayer.setAttribute("opacity", "0");
  heartOutlineLayer.setAttribute("y", heartStartY.toFixed(2));
  heartFilledLayer.setAttribute("opacity", "0");
  heartFilledLayer.setAttribute("y", heartFilledFinalY.toFixed(2));
  wordTextGroup.setAttribute("opacity", "0");
  setObj(finalHeartGroup, dotX, dotY, 0.001, 0);
  finalBulbGroup.setAttribute("transform", `translate(${dotX} ${dotY})`);
  finalBulbGroup.setAttribute("opacity", "0");
  finalBulbOutline.setAttribute("opacity", "0");
  bulbBaseLines.forEach(line => line.setAttribute("opacity", "0"));
  finalBulbRays.forEach(line => line.setAttribute("opacity", "0"));
  finalLogoBaseImage.setAttribute("opacity", "0");
  finalLogoRay1.setAttribute("opacity", "0");
  finalLogoRay2.setAttribute("opacity", "0");
  finalLogoRay3.setAttribute("opacity", "0");
  wordDot.setAttribute("opacity", "0");
  bulbRays.setAttribute("opacity", "0");
  bulbRayLines.forEach(line => line.setAttribute("opacity", "0"));
  icons.forEach(o => setObj(o.el, cx, cy, 0.001, 0));
  dots.forEach(o => setDotObj(o.el, cx, cy, 0.001, 0));

  let cursor = 0;

  // 1) Water + clouds
  if (t <= D_WATER) return;
  cursor += D_WATER;

  // 2) Heart rises
  if (t <= cursor + D_HEART_RISE) {
    const p = easeOut((t - cursor) / D_HEART_RISE);
    const y = heartStartY + (heartFinalY - heartStartY) * p;
    heartOutlineLayer.setAttribute("opacity", p.toFixed(3));
    heartOutlineLayer.setAttribute("y", y.toFixed(2));
    return;
  }
  heartOutlineLayer.setAttribute("opacity", "1");
  heartOutlineLayer.setAttribute("y", heartFinalY.toFixed(2));
  cursor += D_HEART_RISE;

  // 3) Icons appear
  if (t <= cursor + D_ICON_APPEAR) {
    const p = easeOut((t - cursor) / D_ICON_APPEAR);
    icons.forEach(o => {
      const pos = posOnOrbit(o, 0);
      setObj(o.el, pos.x, pos.y, .88, p);
    });
    dots.forEach(o => {
      const pos = posOnOrbit(o, 0);
      setDotObj(o.el, pos.x, pos.y, 1, p);
    });
    return;
  }
  cursor += D_ICON_APPEAR;

  // 4) Spin
  if (t <= cursor + D_ORBIT) {
    const p = (t - cursor) / D_ORBIT;
    icons.forEach(o => {
      const pos = posOnOrbit(o, p);
      setObj(o.el, pos.x, pos.y, .88, 1);
    });
    dots.forEach(o => {
      const pos = posOnOrbit(o, p);
      setDotObj(o.el, pos.x, pos.y, 1, 1);
    });
    return;
  }
  cursor += D_ORBIT;

  // 5) Pause
  if (t <= cursor + D_PAUSE) {
    icons.forEach(o => {
      const pos = posOnOrbit(o, 1);
      setObj(o.el, pos.x, pos.y, .88, 1);
    });
    dots.forEach(o => {
      const pos = posOnOrbit(o, 1);
      setDotObj(o.el, pos.x, pos.y, 1, 1);
    });
    heartOutlineLayer.setAttribute("opacity", "1");
    heartOutlineLayer.setAttribute("y", heartFinalY.toFixed(2));
    return;
  }
  cursor += D_PAUSE;

  // 6) Vacuum into heart individually
  if (t <= cursor + D_SUCK) {
    const p = (t - cursor) / D_SUCK;
    heartOutlineLayer.setAttribute("opacity", "1");
    heartOutlineLayer.setAttribute("y", heartFinalY.toFixed(2));
    icons.forEach(o => {
      const start = o.index * 0.04;
      const local = Math.max(0, Math.min(1, (p - start) / 0.62));
      if (local >= 1) {
        setObj(o.el, cx, 395, 0.001, 0);
      } else {
        const pos = suctionPos(o, local);
        setObj(o.el, pos.x, pos.y, .88*(1-.88*easeOut(local)), 1-easeOut(local));
      }
    });
    dots.forEach(o => {
      const start = (o.index % 18) * 0.008;
      const local = Math.max(0, Math.min(1, (p - start) / 0.48));
      if (local >= 1) {
        setDotObj(o.el, cx, 395, 0.001, 0);
      } else {
        const pos = suctionPos(o, local);
        setDotObj(o.el, pos.x, pos.y, 1-.92*easeOut(local), 1-easeOut(local));
      }
    });
    return;
  }
  cursor += D_SUCK;

  // 7) Heart and glare turn green together
  if (t <= cursor + D_FILL_AND_GLARE) {
    const p = easeInOut((t - cursor) / D_FILL_AND_GLARE);
    heartOutlineLayer.setAttribute("opacity", (1-p).toFixed(3));
    heartFilledLayer.setAttribute("opacity", p.toFixed(3));
    reflectionLayer.setAttribute("opacity", p.toFixed(3));
    return;
  }
  heartOutlineLayer.setAttribute("opacity", "0");
  heartFilledLayer.setAttribute("opacity", "1");
  reflectionLayer.setAttribute("opacity", "1");
  cursor += D_FILL_AND_GLARE;

  // 8) Entire scene collapses into the heart location of the official logo
  if (t <= cursor + D_COLLAPSE) {
    const p = easeInOut((t - cursor) / D_COLLAPSE);
    const s = 1 - 0.97*p;
    const op = 1 - 0.85*p;
    setSceneTransform(s, dotX, dotY, op);
    setObj(finalHeartGroup, dotX, dotY, 0.35 + 0.65*p, 0.25 + 0.75*p);
    return;
  }
  setSceneTransform(0.03, dotX, dotY, 0);
  setObj(finalHeartGroup, dotX, dotY, 1, 1);
  cursor += D_COLLAPSE;

  // 9) Fade in the exact official logo without rays first
  if (t <= cursor + D_WORD_REVEAL) {
    const p = easeOut((t - cursor) / D_WORD_REVEAL);
    finalLogoBaseImage.setAttribute("opacity", p.toFixed(3));
    setObj(finalHeartGroup, dotX, dotY, 1 - 0.15*p, 1 - p);
    return;
  }
  finalLogoBaseImage.setAttribute("opacity", "1");
  setObj(finalHeartGroup, dotX, dotY, 0.85, 0);
  cursor += D_WORD_REVEAL;

  // 10) Reveal the three light rays one at a time
  if (t <= cursor + D_RAYS) {
    const p = (t - cursor) / D_RAYS;
    const p1 = Math.max(0, Math.min(1, p / 0.28));
    const p2 = Math.max(0, Math.min(1, (p - 0.30) / 0.28));
    const p3 = Math.max(0, Math.min(1, (p - 0.60) / 0.28));
    finalLogoBaseImage.setAttribute("opacity", "1");
    finalLogoRay1.setAttribute("opacity", easeOut(p1).toFixed(3));
    finalLogoRay2.setAttribute("opacity", easeOut(p2).toFixed(3));
    finalLogoRay3.setAttribute("opacity", easeOut(p3).toFixed(3));
    return;
  }
  finalLogoBaseImage.setAttribute("opacity", "1");
  finalLogoRay1.setAttribute("opacity", "1");
  finalLogoRay2.setAttribute("opacity", "1");
  finalLogoRay3.setAttribute("opacity", "1");
}

function animate(ts) {
  if (!startTime) startTime = ts;
  render(ts - startTime);
  if (playing && ts - startTime < TOTAL) raf = requestAnimationFrame(animate);
  else playing = false;
}
function play() {
  if (raf) cancelAnimationFrame(raf);
  startTime = null;
  playing = true;
  raf = requestAnimationFrame(animate);
}
function reset() {
  if (raf) cancelAnimationFrame(raf);
  raf = null;
  startTime = null;
  playing = false;
  play();
}

document.getElementById("play").addEventListener("click", play);
document.getElementById("reset").addEventListener("click", reset);
play();
</script>
</body>
